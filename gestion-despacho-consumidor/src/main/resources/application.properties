spring.application.name=gestion-despacho-consumidor
server.port=${SERVER_PORT:8082}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:guias-registro;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.h2.console.enabled=true

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:admin}
spring.rabbitmq.password=${RABBITMQ_PASS:admin123}

app.rabbitmq.queue.guias=${RABBITMQ_QUEUE_GUIAS:guias.queue}

# Azure AD B2C (OAuth2 Resource Server) - placeholders hasta contar con el tenant real.
azure.ad.b2c.jwk-set-uri=${AZURE_AD_B2C_JWK_SET_URI:https://pendiente.b2clogin.com/pendiente.onmicrosoft.com/B2C_1_signupsignin/discovery/v2.0/keys}
azure.ad.b2c.roles-claim=${AZURE_AD_B2C_ROLES_CLAIM:roles}
