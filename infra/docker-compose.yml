services:
  app:
    image: ${APP_IMAGE:?APP_IMAGE must be set in .env}
    container_name: gestion-despacho
    ports: ["8080:8080"]
    volumes: ["${HOST_EFS_DIR:?HOST_EFS_DIR must be set in .env}:${APP_EFS_DIR:?APP_EFS_DIR must be set in .env}"]
    environment:
      APP_EFS_DIR: ${APP_EFS_DIR:?APP_EFS_DIR must be set in .env}
      CONSUMIDOR_INTERNAL_URL: http://consumidor:8082
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:?RABBITMQ_USER must be set in .env}
      RABBITMQ_PASS: ${RABBITMQ_PASS:?RABBITMQ_PASS must be set in .env}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_JWK_SET_URI: ${AZURE_JWK_SET_URI:-}
      AZURE_ISSUER_URI: ${AZURE_ISSUER_URI:-}
      AZURE_ROLES_CLAIM: ${AZURE_ROLES_CLAIM:-roles}
    depends_on:
      rabbitmq: { condition: service_healthy }
    restart: unless-stopped
  consumidor:
    image: ${CONSUMIDOR_IMAGE:?CONSUMIDOR_IMAGE must be set in .env}
    container_name: gestion-despacho-consumidor
    volumes: ["${HOST_EFS_DIR:?HOST_EFS_DIR must be set in .env}:${APP_EFS_DIR:?APP_EFS_DIR must be set in .env}"]
    environment:
      SERVER_PORT: 8082
      APP_EFS_DIR: ${APP_EFS_DIR:?APP_EFS_DIR must be set in .env}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:?RABBITMQ_USER must be set in .env}
      RABBITMQ_PASS: ${RABBITMQ_PASS:?RABBITMQ_PASS must be set in .env}
      SPRING_DATASOURCE_URL: ${CONSUMIDOR_SPRING_DATASOURCE_URL:?CONSUMIDOR_SPRING_DATASOURCE_URL must be set in .env}
      SPRING_DATASOURCE_DRIVER: oracle.jdbc.OracleDriver
      SPRING_DATASOURCE_USERNAME: ${ORACLE_APP_USER:?ORACLE_APP_USER must be set}
      SPRING_DATASOURCE_PASSWORD: ${ORACLE_APP_PASSWORD:?ORACLE_APP_PASSWORD must be set}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      AZURE_JWK_SET_URI: ${AZURE_JWK_SET_URI:-}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_ISSUER_URI: ${AZURE_ISSUER_URI:-}
      AZURE_ROLES_CLAIM: ${AZURE_ROLES_CLAIM:-roles}
    depends_on:
      rabbitmq: { condition: service_healthy }
      oracle: { condition: service_healthy }
    restart: unless-stopped
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?RABBITMQ_USER must be set in .env}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:?RABBITMQ_PASS must be set in .env}
    volumes: ["rabbitmq_data:/var/lib/rabbitmq"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
  oracle:
    image: gvenzl/oracle-free:23.5-slim
    container_name: gestion-despacho-oracle
    environment:
      ORACLE_PASSWORD: ${ORACLE_SYSTEM_PASSWORD:?ORACLE_SYSTEM_PASSWORD must be set}
      APP_USER: ${ORACLE_APP_USER:?ORACLE_APP_USER must be set}
      APP_USER_PASSWORD: ${ORACLE_APP_PASSWORD:?ORACLE_APP_PASSWORD must be set}
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./oracle/init:/container-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped
volumes:
  rabbitmq_data:
  oracle_data:
