name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Dar permiso de ejecución a mvnw
        run: chmod +x mvnw

      - name: Test productor
        run: ./mvnw -B test

      - name: Test consumidor
        working-directory: gestion-despacho-consumidor
        run: mvn -B test

  build-and-deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push productor
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gestion-despacho:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gestion-despacho:${{ github.sha }}
          cache-from: type=gha,scope=productor
          cache-to: type=gha,mode=max,scope=productor

      - name: Build y push consumidor
        uses: docker/build-push-action@v6
        with:
          context: ./gestion-despacho-consumidor
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gestion-despacho-consumidor:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gestion-despacho-consumidor:${{ github.sha }}
          cache-from: type=gha,scope=consumidor
          cache-to: type=gha,mode=max,scope=consumidor

      - name: Copiar docker-compose.yml a la EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.USER_SERVER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.yml
          target: ~/

      - name: Desplegar en la EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.USER_SERVER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cat > ~/.env << EOF
            APP_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/gestion-despacho:${{ github.sha }}
            CONSUMIDOR_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/gestion-despacho-consumidor:${{ github.sha }}
            APP_EFS_DIR=/app/efs
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }}
            AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}
            AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}
            AZURE_B2C_USER_FLOW=${{ secrets.AZURE_B2C_USER_FLOW }}
            AZURE_ISSUER_URI=${{ secrets.AZURE_ISSUER_URI }}
            AZURE_JWK_SET_URI=${{ secrets.AZURE_JWK_SET_URI }}
            EOF
            cd ~
            docker compose pull app consumidor
            docker compose up -d
            docker image prune -f
