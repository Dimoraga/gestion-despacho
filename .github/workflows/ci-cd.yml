name: CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Dar permiso de ejecución a mvnw
        run: chmod +x mvnw

      - name: Test productor
        run: ./mvnw -B test

      - name: Test consumidor
        working-directory: gestion-despacho-consumidor
        run: mvn -B test

  build-and-deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push productor
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gestion-despacho:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gestion-despacho:${{ github.sha }}
          cache-from: type=gha,scope=productor
          cache-to: type=gha,mode=max,scope=productor

      - name: Build y push consumidor
        uses: docker/build-push-action@v6
        with:
          context: ./gestion-despacho-consumidor
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gestion-despacho-consumidor:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gestion-despacho-consumidor:${{ github.sha }}
          cache-from: type=gha,scope=consumidor
          cache-to: type=gha,mode=max,scope=consumidor

      - name: Desplegar en la EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.USER_SERVER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30s
          command_timeout: 18m
          script: |
            set -euo pipefail
            umask 077
            printf '%s\n' 'Descargando docker-compose.yml del commit de despliegue...'
            curl -fsSL --connect-timeout 10 --max-time 60 --retry 3 --retry-max-time 60 https://raw.githubusercontent.com/Dimoraga/gestion-despacho/${{ github.sha }}/docker-compose.yml -o ~/docker-compose.yml
            if [ ! -s ~/docker-compose.yml ]; then
              printf '%s\n' 'Error: no se pudo obtener ~/docker-compose.yml.' >&2
              exit 1
            fi
            printf '%s\n' 'Creando archivo de entorno protegido...'
            cat > ~/.env << EOF
            APP_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/gestion-despacho:${{ github.sha }}
            CONSUMIDOR_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/gestion-despacho-consumidor:${{ github.sha }}
            APP_EFS_DIR=/app/efs
            HOST_EFS_DIR=/mnt/efs/gestion-despacho-consumidor
            CONSUMIDOR_SPRING_DATASOURCE_URL=jdbc:h2:file:/app/efs/h2/guias-registro;DB_CLOSE_DELAY=-1
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }}
            RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}
            RABBITMQ_PASS=${{ secrets.RABBITMQ_PASS }}
            AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}
            AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}
            AZURE_ISSUER_URI=${{ secrets.AZURE_ISSUER_URI }}
            AZURE_JWK_SET_URI=${{ secrets.AZURE_JWK_SET_URI }}
            AZURE_ROLES_CLAIM=${{ secrets.AZURE_ROLES_CLAIM || 'roles' }}
            EOF
            cd ~
            EFS_MOUNT=/mnt/efs
            EFS_CONSUMIDOR_DIR="$EFS_MOUNT/gestion-despacho-consumidor"
            if ! mountpoint -q "$EFS_MOUNT"; then
              printf '%s\n' "Error: $EFS_MOUNT no es un punto de montaje EFS disponible." >&2
              exit 1
            fi
            printf '%s\n' 'Validando configuración de Docker Compose...'
            docker compose config -q
            printf '%s\n' 'Iniciando descarga de imágenes Docker...'
            if command -v timeout >/dev/null 2>&1; then
              timeout 8m docker compose pull app consumidor rabbitmq
            else
              docker compose pull app consumidor rabbitmq
            fi
            printf '%s\n' 'Descarga de imágenes Docker finalizada.'
            if ! CONSUMIDOR_UID="$(docker run --rm --entrypoint id "${{ secrets.DOCKERHUB_USERNAME }}/gestion-despacho-consumidor:${{ github.sha }}" -u app)" || ! CONSUMIDOR_GID="$(docker run --rm --entrypoint id "${{ secrets.DOCKERHUB_USERNAME }}/gestion-despacho-consumidor:${{ github.sha }}" -g app)"; then
              printf '%s\n' 'Error: no se pudo obtener el UID/GID no-root del contenedor consumidor.' >&2
              exit 1
            fi
            if ! sudo -n true; then
              printf '%s\n' 'Error: el usuario de despliegue necesita sudo sin contraseña para preparar permisos EFS.' >&2
              exit 1
            fi
            if ! sudo -n install -d -m 2770 "$EFS_CONSUMIDOR_DIR" || ! sudo -n chown "$CONSUMIDOR_UID:$CONSUMIDOR_GID" "$EFS_CONSUMIDOR_DIR"; then
              printf '%s\n' 'Error: no se pudieron preparar permisos EFS para el UID/GID no-root del consumidor.' >&2
              exit 1
            fi
            if ! docker run --rm --user "$CONSUMIDOR_UID:$CONSUMIDOR_GID" -v "$EFS_CONSUMIDOR_DIR:/app/efs" --entrypoint sh "${{ secrets.DOCKERHUB_USERNAME }}/gestion-despacho-consumidor:${{ github.sha }}" -c 'touch /app/efs/.write-check && rm -f /app/efs/.write-check'; then
              printf '%s\n' 'Error: el usuario no-root del consumidor no puede escribir en el subdirectorio EFS.' >&2
              exit 1
            fi
            printf '%s\n' 'Iniciando actualización de servicios Docker...'
            diagnostico_compose() {
              printf '%s\n' 'Diagnóstico de Docker Compose tras fallo de disponibilidad:' >&2
              docker compose ps || true
              docker compose logs --tail=200 || true
            }
            if command -v timeout >/dev/null 2>&1; then
              if ! timeout 5m docker compose up -d --wait --wait-timeout 180; then
                diagnostico_compose
                exit 1
              fi
            else
              if ! docker compose up -d --wait --wait-timeout 180; then
                diagnostico_compose
                exit 1
              fi
            fi
            printf '%s\n' 'Servicios Docker iniciados y saludables.'
            docker compose ps
            if command -v timeout >/dev/null 2>&1; then
              timeout 1m docker image prune -f
            else
              docker image prune -f
            fi
