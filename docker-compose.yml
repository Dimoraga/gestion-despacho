services:
  app:
    image: ${APP_IMAGE:-dalvaes/gestion-despacho:latest}
    container_name: gestion-despacho
    ports: ["8080:8080"]
    volumes:
      - /mnt/efs:/app/efs
    environment:
      APP_EFS_DIR: ${APP_EFS_DIR:-/app/efs}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-admin123}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:h2:mem:guias;DB_CLOSE_DELAY=-1}
      SPRING_DATASOURCE_DRIVER: ${SPRING_DATASOURCE_DRIVER:-org.h2.Driver}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-sa}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-}
    restart: unless-stopped
    depends_on:
      - rabbitmq

  consumidor:
    image: ${CONSUMIDOR_IMAGE:-dalvaes/gestion-despacho-consumidor:latest}
    container_name: gestion-despacho-consumidor
    ports: ["8082:8082"]
    environment:
      SERVER_PORT: 8082
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-admin123}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:h2:mem:guias-registro;DB_CLOSE_DELAY=-1}
      SPRING_DATASOURCE_DRIVER: ${SPRING_DATASOURCE_DRIVER:-org.h2.Driver}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-sa}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-}
    restart: unless-stopped
    depends_on:
      - rabbitmq

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-admin123}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

volumes:
  rabbitmq_data:

