services:
  app:
    image: ${APP_IMAGE:-dalvaes/gestion-despacho:latest}
    container_name: gestion-despacho
    ports: ["8080:8080"]
    volumes: ["${HOST_EFS_DIR:-/mnt/efs}:/app/efs"]
    environment:
      APP_EFS_DIR: ${APP_EFS_DIR:-/app/efs}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-admin123}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:h2:mem:guias;DB_CLOSE_DELAY=-1}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_JWK_SET_URI: ${AZURE_JWK_SET_URI:-}
      AZURE_B2C_USER_FLOW: ${AZURE_B2C_USER_FLOW:-B2C_1_signupsignin}
      AZURE_ROLES_CLAIM: ${AZURE_ROLES_CLAIM:-roles}
    depends_on:
      rabbitmq: { condition: service_healthy }
    restart: unless-stopped
  consumidor:
    image: ${CONSUMIDOR_IMAGE:-dalvaes/gestion-despacho-consumidor:latest}
    container_name: gestion-despacho-consumidor
    ports: ["8082:8082"]
    environment:
      SERVER_PORT: 8082
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-admin123}
      AZURE_JWK_SET_URI: ${AZURE_JWK_SET_URI:-}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_B2C_USER_FLOW: ${AZURE_B2C_USER_FLOW:-B2C_1_signupsignin}
      AZURE_ROLES_CLAIM: ${AZURE_ROLES_CLAIM:-roles}
    depends_on:
      rabbitmq: { condition: service_healthy }
    restart: unless-stopped
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports: ["5672:5672", "15672:15672"]
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-admin123}
    volumes: ["rabbitmq_data:/var/lib/rabbitmq"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
volumes:
  rabbitmq_data:
