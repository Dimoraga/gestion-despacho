spring.application.name=gestion-despacho-consumidor
server.port=${SERVER_PORT:8082}

# El mismo APP_EFS_DIR ya montado por el contenedor conserva estado/idempotencia entre reinicios.
# SPRING_DATASOURCE_URL permite usar Oracle u otro datasource en despliegues que lo requieran.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@//oracle:1521/FREEPDB1}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:APP_USER}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:APP_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:admin}
spring.rabbitmq.password=${RABBITMQ_PASS:admin123}

app.rabbitmq.queue.guias=${RABBITMQ_QUEUE_GUIAS:guias.queue}
spring.rabbitmq.listener.simple.acknowledge-mode=manual
app.efs.dir=${APP_EFS_DIR:/app/efs}
app.processing-worker-ms=${APP_PROCESSING_WORKER_MS:5000}
app.processing-lease-seconds=${APP_PROCESSING_LEASE_SECONDS:60}
app.processing-max-retries=${APP_PROCESSING_MAX_RETRIES:5}
aws.s3.bucket=${AWS_S3_BUCKET:}
aws.s3.region=${AWS_REGION:us-east-1}
aws.accessKeyId=${AWS_ACCESS_KEY_ID:}
aws.secretAccessKey=${AWS_SECRET_ACCESS_KEY:}
aws.sessionToken=${AWS_SESSION_TOKEN:}

# Microsoft Entra ID (OAuth2 Resource Server); los valores se proporcionan por entorno.
app.azure.jwk-set-uri=${AZURE_JWK_SET_URI:}
app.azure.roles-claim=${AZURE_ROLES_CLAIM:roles}
app.azure.issuer-uri=${AZURE_ISSUER_URI:}
app.azure.audience=${AZURE_CLIENT_ID:}
