spring.application.name=gestion-despacho
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:guias;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.h2.console.enabled=true

app.efs.dir=${APP_EFS_DIR:/app/efs}

aws.s3.region=${AWS_REGION:us-east-1}
aws.s3.bucket=${AWS_S3_BUCKET:}
aws.accessKeyId=${AWS_ACCESS_KEY_ID:}
aws.secretAccessKey=${AWS_SECRET_ACCESS_KEY:}
aws.sessionToken=${AWS_SESSION_TOKEN:}

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

app.rabbitmq.queue=${APP_RABBITMQ_QUEUE:guia-despacho.queue}
app.rabbitmq.exchange=${APP_RABBITMQ_EXCHANGE:guia-despacho.exchange}
app.rabbitmq.routing-key=${APP_RABBITMQ_ROUTING_KEY:guia-despacho.creada}

springdoc.swagger-ui.path=/swagger-ui.html

# -------------------------------------------------------
# Azure AD B2C - OAuth2 Resource Server
# -------------------------------------------------------
azure.b2c.tenant-id=${AZURE_TENANT_ID:}
azure.b2c.user-flow=${AZURE_B2C_USER_FLOW:B2C_1_signupsignin}
azure.b2c.client-id=${AZURE_CLIENT_ID:}

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AZURE_JWK_SET_URI:}
